# =============================================================================
# CNB 流水线公共配置 — CC Switch 多平台构建
# =============================================================================

# ------------------------------------------------------------------
# 1. Rust + Node.js 构建环境
# ------------------------------------------------------------------
.rust-node-env: &rust-node-env
  docker:
    image: rust:1.85-bookworm
    volumes:
      - cargo-cache
      - node_modules
  services:
    - docker
  env:
    CARGO_HOME: /usr/local/cargo
    PNPM_HOME: /root/.local/share/pnpm
    PATH: /root/.local/share/pnpm:/root/.cargo/bin:/usr/local/cargo/bin:$PATH
  imports:
    - https://cnb.cool/cnb/skills/cnb-skill/-/blob/main/secrets.yml

# ------------------------------------------------------------------
# 2. 安装系统依赖
# ------------------------------------------------------------------
.install-system-deps: &install-system-deps
  name: 安装系统依赖
  script: |
    apt-get update -qq
    apt-get install -y -qq \
      libwebkit2gtk-4.1-dev \
      libgtk-3-dev \
      libayatana-appindicator3-dev \
      librsvg2-dev \
      libsoup-3.0-dev \
      libjavascriptcoregtk-4.1-dev \
      patchelf \
      pkg-config \
      curl \
      wget \
      file \
      openssl

# ------------------------------------------------------------------
# 3. 安装 Rust 目标平台
# ------------------------------------------------------------------
.install-rust-targets: &install-rust-targets
  name: 安装 Rust 交叉编译目标
  script: |
    rustup target add x86_64-unknown-linux-gnu
    rustup target add aarch64-unknown-linux-gnu
    # Windows 交叉编译目标（需要 MinGW 链接器）
    rustup target add x86_64-pc-windows-gnu

# ------------------------------------------------------------------
# 4. 安装 pnpm + 前端依赖
# ------------------------------------------------------------------
.install-pnpm: &install-pnpm
  name: 安装 pnpm
  script: |
    npm install -g pnpm

.install-frontend-deps: &install-frontend-deps
  name: 安装前端依赖
  script: |
    pnpm install --frozen-lockfile

# ------------------------------------------------------------------
# 5. 构建前端
# ------------------------------------------------------------------
.build-frontend: &build-frontend
  name: 构建前端
  script: |
    pnpm run build:renderer

# ------------------------------------------------------------------
# 6. 构建安装包（Linux x86_64）
# ------------------------------------------------------------------
.build-linux-x64: &build-linux-x64
  name: 构建 Linux x86_64 (deb/appimage)
  script: |
    cargo tauri build --bundles deb,appimage 2>&1

.build-linux-arm64: &build-linux-arm64
  name: 构建 Linux ARM64 (deb)
  script: |
    # 交叉编译 ARM64 后端
    cargo build --release --target aarch64-unknown-linux-gnu
    # 打包 (需 Tauri 交叉编译配置)
    cargo tauri build --bundles deb --target aarch64-unknown-linux-gnu 2>&1 || \
      echo "ARM64 交叉编译需要额外配置，请参考 Tauri 文档"

# ------------------------------------------------------------------
# 7. 上传制品
# ------------------------------------------------------------------
.upload-artifacts: &upload-artifacts
  name: 上传构建制品
  script: |
    echo "上传制品..."
    mkdir -p artifacts
    find src-tauri/target/release/bundle -name "*.deb" -o -name "*.AppImage" | \
      while read f; do
        cp "$f" artifacts/
        echo "  ✓ $(basename "$f")"
      done
    ls -lh artifacts/

# ------------------------------------------------------------------
# 8. 版本提取
# ------------------------------------------------------------------
.extract-version: &extract-version
  name: 提取版本号
  script: |
    VERSION=$(grep '^version' src-tauri/Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
    echo "VERSION=$VERSION" >> $CNB_ENV
    echo "构建版本: v$VERSION"
