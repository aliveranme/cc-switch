# CNB 流水线 — PR check
###############################################################################
# 分支: *

include:
  - .ci/.shared-config.yml

$:
  pull_request:
    - <<: *rust-node-env
      stages:
        - *install-system-deps
        - *install-pnpm
        - *install-frontend-deps
        - name: 类型检查
          script: pnpm typecheck
        - name: 单元测试
          script: pnpm test:unit
        - name: Rust 编译检查
          script: |
            cargo check --lib --release
        - name: Rust 单元测试
          script: |
            cargo test --lib 2>&1 | tail -5
        - name: 构建前端
          script: pnpm build:renderer

  push:
    - <<: *rust-node-env
      name: 前端构建 + Rust 编译检查
      stages:
        - *install-system-deps
        - *install-pnpm
        - *install-frontend-deps
        - *build-frontend
        - name: Rust 编译
          script: cargo build --release
