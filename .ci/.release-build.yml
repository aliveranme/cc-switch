# CNB 流水线 — Release 构建
###############################################################################
# 分支: main
# 事件: tag_push

include:
  - .ci/.shared-config.yml

.release-env: &release-env
  <<: *rust-node-env
  runner:
    cpus: 16

main:
  tag_push:
    - <<: *release-env
      name: 构建 Linux x86_64 安装包
      stages:
        - *extract-version
        - *install-system-deps
        - *install-pnpm
        - *install-frontend-deps
        - *build-frontend
        - name: 构建 Linux 安装包
          script: |
            cargo tauri build --bundles deb,appimage 2>&1
        - *upload-artifacts
      failStages:
        - name: 发失败通知
          script: |
            echo "Release 构建失败: v${VERSION:-unknown}"

  push:
    - <<: *release-env
      name: 每日构建 Linux x86_64
      stages:
        - *extract-version
        - *install-system-deps
        - *install-pnpm
        - *install-frontend-deps
        - *build-frontend
        - name: 构建 Linux 安装包
          script: |
            cargo tauri build --bundles deb 2>&1
        - *upload-artifacts
