# CNB Web 触发器 — CC Switch 安装包构建
###############################################################################
# 分支匹配规则：
# ^main$   → main 分支页面显示"构建安装包"按钮
# ^v\d+\.\d+\.\d+  → 版本 Tag 页面显示"发布 Release"按钮

branch:
  - reg: ^main$
    buttons:
      - name: 构建安装包
        event: web_trigger
        description: 手动触发 CC Switch Linux 安装包构建（生成 .deb）
