# CNB 流水线 — CC Switch
# 多平台 Linux 安装包构建
###############################################################################
#
# 触发方式:
#   push (main)          → 自动构建 dev 安装包
#   api_trigger (手触)   → 手动触发构建
#   tag_push             → 构建 release 安装包
#   pull_request         → PR 代码检查

# ============================================================================
# 公共环境
# ============================================================================
.rust-env: &rust-env
  docker:
    image: rust:1.85-bookworm
    volumes:
      - cargo-cache
      - node_modules
  env:
    DEBIAN_FRONTEND: noninteractive
    CARGO_HOME: /usr/local/cargo
    PATH: /usr/local/node/bin:/usr/local/cargo/bin:/root/.cargo/bin:$PATH

# 系统依赖 + Node.js
.install-deps: &install-deps
  name: 安装系统依赖
  script: |
    set -e
    echo "[1/4] apt update..."
    apt-get update -qq && echo "  OK"
    echo "[2/4] apt install Tauri deps..."
    apt-get install -y -qq \
      curl ca-certificates gnupg \
      libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev \
      librsvg2-dev libsoup-3.0-dev libjavascriptcoregtk-4.1-dev \
      patchelf pkg-config wget file openssl 2>&1 && echo "  OK"

# pnpm + Tauri CLI
.install-tools: &install-tools
  name: 安装 pnpm + Tauri CLI
  script: |
    set -e
    echo "[3/4] nodesource setup..."
    curl -fsSL https://deb.nodesource.com/setup_20.x | bash - 2>&1 | tail -3
    echo "[4/4] apt install nodejs..."
    apt-get install -y -qq nodejs 2>&1 && echo "  OK"
    echo "node $(node --version) npm $(npm --version)"
    npm install -g pnpm@latest @tauri-apps/cli@latest 2>&1 | tail -3
    rustup target add x86_64-unknown-linux-gnu 2>&1 | tail -1

# 前端构建
.build-app: &build-app
  name: 安装依赖 + 构建前端
  script: |
    pnpm install --frozen-lockfile
    pnpm build:renderer

# ============================================================================
# 流水线定义
# ============================================================================
$:
  # ── 手动/API 触发构建 ──
  api_trigger:
    - <<: *rust-env
      name: 构建安装包（手动触发）
      stages:
        - *install-deps
        - *install-tools
        - *build-app
        - name: 编译 + 打包
          script: |
            pnpm tauri build --bundles deb,appimage 2>&1

  # ── PR 代码检查 ──
  pull_request:
    - <<: *rust-env
      name: PR 代码检查
      stages:
        - *install-deps
        - *install-tools
        - name: 前端依赖 + 类型检查
          script: |
            pnpm install --frozen-lockfile
            pnpm typecheck 2>&1 || echo "类型检查有警告"
        - name: Rust 编译检查
          script: cargo check --lib --release 2>&1
        - name: Rust 单元测试
          script: cargo test --lib 2>&1 | tail -5

  # ── Tag 发布 ──
  tag_push:
    - <<: *rust-env
      name: Release 构建
      stages:
        - *install-deps
        - *install-tools
        - *build-app
        - name: 编译 + 打包
          script: |
            pnpm tauri build --bundles deb,appimage 2>&1

main:
  # ── Push 自动构建 ──
  push:
    - <<: *rust-env
      name: 自动构建安装包
      stages:
        - *install-deps
        - *install-tools
        - *build-app
        - name: 编译 + 打包
          script: |
            pnpm tauri build --bundles deb 2>&1
