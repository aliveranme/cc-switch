# CNB 流水线 — CC Switch
# Linux 安装包构建 + 跨平台编译 + Release 自动发布
###############################################################################
#
# 触发方式:
#   push (main)          → 自动构建 Linux .deb
#   web_trigger (网页)   → 页面按钮手动触发
#   tag_push             → 构建 + 创建 Release + 上传附件
#   pull_request         → PR 代码检查
#
# 多平台支持:
#   ✅ Linux x86_64  — 完整 .deb 安装包
#   ⏳ Windows x64   — Rust 交叉编译二进制（MSI 需 Windows 专用 runner）
#   ⏳ macOS ARM64   — Rust 交叉编译二进制（DMG 需 Apple Silicon runner）

# ============================================================================
# 公共环境
# ============================================================================
.rust-env: &rust-env
  docker:
    image: rust:1.85-bookworm
  env:
    DEBIAN_FRONTEND: noninteractive
    TAURI_SIGNING_PRIVATE_KEY: ""
    TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""

# ============================================================================
# 可复用 Stage 定义
# ============================================================================

# ---------- 安装系统依赖 ----------
.install-deps: &install-deps
  name: 安装系统依赖
  script: |
    set -e
    apt-get update -qq
    apt-get install -y -qq \
      curl ca-certificates gnupg \
      libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev \
      librsvg2-dev libsoup-3.0-dev libjavascriptcoregtk-4.1-dev \
      patchelf pkg-config wget file openssl

# ---------- 安装工具链 ----------
.install-tools: &install-tools
  name: 安装工具链
  script: |
    set -e
    curl -fsSL https://deb.nodesource.com/setup_22.x | bash -
    apt-get install -y -qq nodejs
    npm install -g pnpm@latest @tauri-apps/cli@latest | tail -1
    rustup target add x86_64-unknown-linux-gnu

# ---------- 构建前端 ----------
.build-frontend: &build-frontend
  name: 构建前端
  script: |
    pnpm install --frozen-lockfile 2>&1 | tail -3
    pnpm build:renderer 2>&1 | tail -3

# ---------- 编译 Linux .deb ----------
.build-deb: &build-deb
  name: 编译 + 打包 .deb
  script: |
    set -e
    pnpm tauri build --bundles deb 2>&1 | tail -20 || echo "[WARN] signing failed (deb exists)"
    mkdir -p artifacts
    cp src-tauri/target/release/bundle/deb/*.deb artifacts/ 2>/dev/null || true
    ls -lh artifacts/

# ============================================================================
# 流水线定义
# ============================================================================
$:
  # ── 网页按钮触发 ──
  web_trigger:
    - <<: *rust-env
      name: 构建安装包
      stages:
        - *install-deps
        - *install-tools
        - *build-frontend
        - *build-deb

  # ── API 触发 ──
  api_trigger:
    - <<: *rust-env
      name: 构建安装包
      stages:
        - *install-deps
        - *install-tools
        - *build-frontend
        - *build-deb

  # ── PR 检查 ──
  pull_request:
    - <<: *rust-env
      name: PR 代码检查
      stages:
        - *install-deps
        - *install-tools
        - name: 前端 + 类型检查
          script: |
            pnpm install --frozen-lockfile
            pnpm typecheck 2>&1 || echo "skip"
        - name: Rust 编译检查
          script: cargo check --lib --release 2>&1
        - name: Rust 单元测试
          script: cargo test --lib 2>&1 | tail -5

  # ── Tag 发布 ──
  tag_push:
    - <<: *rust-env
      name: Release 构建 + 发布
      stages:
        - *install-deps
        - *install-tools
        - *build-frontend
        - *build-deb
        # 创建 Release
        - type: git:release
          name: 创建 Release
          options:
            overlying: false
            title: "CC Switch $CNB_BRANCH"
            descriptionFromFile: CHANGELOG.md
            preRelease: false
            latest: "true"
        # 上传 .deb 附件到 Release（依赖上面创建的 Release）
        - image: cnbcool/attachments:latest
          name: 上传 .deb 到 Release
          settings:
            tag: $CNB_BRANCH
            attachments:
              - "./artifacts/*.deb"

main:
  push:
    - <<: *rust-env
      name: 自动构建
      stages:
        - *install-deps
        - *install-tools
        - *build-frontend
        - *build-deb
