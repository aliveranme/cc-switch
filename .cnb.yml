# CNB 流水线 — CC Switch 自动审查
###############################################################################
# pull_request → PR 代码审查（类型检查 + Rust 编译 + 测试）
# push (main)  → 提交后自动检查

.ci-pipeline: &ci-pipeline
  docker:
    image: rust:1.95-bookworm
  env:
    DEBIAN_FRONTEND: noninteractive
  stages:
    - name: 安装依赖
      script: |
        set -e
        apt-get update -qq
        apt-get install -y -qq libwebkit2gtk-4.1-dev libgtk-3-dev librsvg2-dev patchelf curl ca-certificates gnupg
        curl -fsSL https://deb.nodesource.com/setup_22.x | bash -
        apt-get install -y -qq nodejs
        npm install -g pnpm@latest | tail -1
    - name: 前端检查
      script: |
        pnpm install --frozen-lockfile 2>&1 | tail -3
        pnpm typecheck 2>&1 || echo "类型检查有警告"
    - name: Rust 编译检查
      script: |
        cargo check --lib --release 2>&1
    - name: Rust 单元测试
      script: |
        cargo test --lib 2>&1 | tail -5

$:
  pull_request:
    - *ci-pipeline

main:
  push:
    - *ci-pipeline
