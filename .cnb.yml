# CNB 流水线 — CC Switch
# 多平台 Linux 安装包构建
###############################################################################
#
# 触发方式:
#   push (main)    → 构建 dev 安装包
#   api_trigger    → 手动触发构建
#   tag_push       → 构建 release 安装包
#   pull_request   → 代码检查

# ============================================================================
# 复用环境片段
# ============================================================================
.rust-env: &rust-env
  docker:
    image: rust:1.85-bookworm
    volumes:
      - cargo-cache
      - node_modules
  env:
    DEBIAN_FRONTEND: noninteractive
    CARGO_HOME: /usr/local/cargo
    PATH: /usr/local/node/bin:/usr/local/cargo/bin:/root/.cargo/bin:$PATH

.install-deps: &install-deps
  name: 安装系统依赖 + Node.js
  script: |
    apt-get update -qq
    apt-get install -y -qq \
      curl ca-certificates gnupg \
      libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev \
      librsvg2-dev libsoup-3.0-dev libjavascriptcoregtk-4.1-dev \
      patchelf pkg-config wget file openssl
    # 安装 Node.js 20 LTS
    curl -fsSL https://deb.nodesource.com/setup_20.x | bash -
    apt-get install -y -qq nodejs

.install-pnpm: &install-pnpm
  name: 安装 pnpm + Tauri CLI
  script: |
    npm install -g pnpm@latest
    # 用 npm 安装 Tauri CLI（比 cargo install 快，无需编译）
    npm install -g @tauri-apps/cli@latest
    rustup target add x86_64-unknown-linux-gnu
    node --version && npm --version && pnpm --version

.install-frontend: &install-frontend
  name: 安装前端依赖
  script: |
    pnpm install --frozen-lockfile 2>&1

.build-frontend: &build-frontend
  name: 构建前端
  script: |
    pnpm build:renderer 2>&1

# ============================================================================
# main 分支：push + api_trigger
# ============================================================================
main:
  push:
    - <<: *rust-env
      name: 构建 Linux 安装包
      stages:
        - *install-deps
        - *install-pnpm
        - *install-frontend
        - *build-frontend
        - name: 编译 Rust + 打包
          script: |
            # Tauri CLI 已通过 npm 全局安装
            pnpm tauri build --bundles deb,appimage 2>&1

  api_trigger:
    - <<: *rust-env
      name: 手动触发构建
      stages:
        - *install-deps
        - *install-pnpm
        - *install-frontend
        - *build-frontend
        - name: 编译 Rust + 打包
          script: |
            # Tauri CLI 已通过 npm 全局安装
            pnpm tauri build --bundles deb,appimage 2>&1

# ============================================================================
# 兜底分支
# ============================================================================
$:
  pull_request:
    - <<: *rust-env
      name: PR 代码检查
      stages:
        - *install-deps
        - *install-pnpm
        - name: 安装前端依赖 + 类型检查
          script: |
            pnpm install --frozen-lockfile
            pnpm typecheck 2>&1 || echo "类型检查有警告"
        - name: Rust 编译检查
          script: cargo check --lib --release 2>&1
        - name: Rust 单元测试
          script: cargo test --lib 2>&1 | tail -5

  tag_push:
    - <<: *rust-env
      name: Release 构建 Linux 安装包
      stages:
        - *install-deps
        - *install-pnpm
        - *install-frontend
        - *build-frontend
        - name: 编译 Rust + 打包
          script: |
            # Tauri CLI 已通过 npm 全局安装
            pnpm tauri build --bundles deb,appimage 2>&1

  api_trigger:
    - <<: *rust-env
      name: 手动触发构建
      stages:
        - *install-deps
        - *install-pnpm
        - *install-frontend
        - *build-frontend
        - name: 编译 Rust + 打包
          script: |
            # Tauri CLI 已通过 npm 全局安装
            pnpm tauri build --bundles deb,appimage 2>&1
