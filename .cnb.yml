# CNB 流水线 — CC Switch
###############################################################################
# 测试流水线：验证构建环境各环节

.rst-img: &rst-img
  docker:
    image: rust:1.85-bookworm
  env:
    DEBIAN_FRONTEND: noninteractive

$:
  api_trigger:
    - <<: *rst-img
      name: 构建环境验证
      stages:
        - name: apt install
          script: |
            apt-get update -qq && echo "[OK] apt update"
            apt-get install -y -qq curl ca-certificates gnupg wget && echo "[OK] basic deps"
        - name: Node.js
          script: |
            curl -fsSL https://deb.nodesource.com/setup_20.x | bash -
            apt-get install -y -qq nodejs
            echo "node $(node --version) npm $(npm --version)"
        - name: pnpm + cargo
          script: |
            npm install -g pnpm
            pnpm --version && cargo --version && rustup target add x86_64-unknown-linux-gnu
        - name: frontend build
          script: |
            npm install -g @tauri-apps/cli
            pnpm install --frozen-lockfile 2>&1 | tail -5
            pnpm build:renderer 2>&1 | tail -5
